<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン — GMS KPI</title>
    <style>
      :root {
        font-family: system-ui, 'Segoe UI', sans-serif;
        background: #f6f4f1;
        color: #1c1917;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 360px;
        background: #fff;
        border: 1px solid #e7e5e4;
        border-radius: 12px;
        padding: 28px 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }
      p {
        margin: 0 0 20px;
        font-size: 0.875rem;
        color: #78716c;
        line-height: 1.45;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: #57534e;
        margin-bottom: 6px;
      }
      input[type='password'] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d6d3d1;
        font-size: 1rem;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #b91c1c;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .err {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #b91c1c;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>GMS KPI ボード</h1>
      <p>パスワードを入力して続行してください。</p>
      <form id="f">
        <label for="p">パスワード</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required />
        <button type="submit" id="btn">ログイン</button>
        <div class="err" id="err" aria-live="polite"></div>
      </form>
    </div>
    <script>
      const f = document.getElementById('f')
      const err = document.getElementById('err')
      const btn = document.getElementById('btn')
      f.addEventListener('submit', async (e) => {
        e.preventDefault()
        err.textContent = ''
        btn.disabled = true
        const password = document.getElementById('p').value
        try {
          const r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          })
          const j = await r.json().catch(() => ({}))
          if (r.ok && j.ok) {
            window.location.href = '/'
            return
          }
          err.textContent = 'パスワードが違うか、サーバー設定を確認してください。'
        } catch {
          err.textContent = '通信に失敗しました。ネットワークを確認してください。'
        } finally {
          btn.disabled = false
        }
      })
    </script>
  </body>
</html>
